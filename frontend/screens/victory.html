<section id="victory-screen" class="screen" aria-labelledby="victory-title">
    <div class="victory-confetti" aria-hidden="true"></div>
    <div class="victory-shell">
        <header class="victory-header">
            <h2 id="victory-title"><i class="fa-solid fa-star" style="color: #ffda44; margin-right: 15px; font-size: 0.6em;"></i>Bảng xếp hạng<i class="fa-solid fa-star" style="color: #ffda44; margin-left: 15px; font-size: 0.6em;"></i></h2>
            <div class="victory-ribbon">Cuộc đua đã kết thúc</div>
        </header>
        <div class="victory-podium" id="victory-podium" aria-label="Ba tay đua dẫn đầu"></div>
        <section class="victory-leaderboard" aria-labelledby="final-ranking-title">
            <div class="leaderboard-heading">
                <div><span class="leaderboard-kicker">Kết quả chung cuộc</span><h3 id="final-ranking-title">Thứ hạng các tay đua</h3></div>
                <span class="leaderboard-count" id="victory-player-count">0 tay đua</span>
            </div>
            <div class="leaderboard-columns" aria-hidden="true"><span>Hạng</span><span>Tay đua</span><span>Vòng</span><span>Tiến độ</span></div>
            <div class="leaderboard-table" id="victory-leaderboard-list"></div>
        </section>
        <div class="victory-actions">
            <button id="btn-play-again" class="victory-btn victory-btn-primary"><i class="fa-solid fa-rotate-right"></i> Chơi lại</button>
            <button id="btn-victory-home" class="victory-btn victory-btn-secondary"><i class="fa-solid fa-house"></i> Về menu</button>
        </div>
    </div>
</section>
