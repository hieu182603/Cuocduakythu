<section id="lobby-screen" class="screen">
    <div class="lobby-container">
        <div class="lobby-header">
            <button id="btn-lobby-back" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Quay lại</button>
            <h2>Thiết Lập Phòng Chơi</h2>
        </div>

        <div class="lobby-setup" id="lobby-setup-panel">
            <div class="player-count-select">
                <label>Số lượng người chơi (2 - 6):</label>
                <div class="count-selector">
                    <button type="button" class="btn-count-adj" data-adj="-1">-</button>
                    <span id="player-count-display">4</span>
                    <button type="button" class="btn-count-adj" data-adj="1">+</button>
                </div>
            </div>
        </div>

        <!-- Online Room Status Display -->
        <div class="lobby-setup-online" id="lobby-online-panel" style="display:none;">
            <div class="room-info-card" style="flex: 1; min-width: 100%;">
                <div class="room-info-header">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span class="room-badge">ONLINE</span>
                        <button id="host-only-controls" class="btn-gear-settings" style="display: none;" title="Cấu hình phòng chơi">
                            <i class="fa-solid fa-gear"></i>
                        </button>
                    </div>
                    <span class="player-count-badge">Sĩ số: <strong id="online-player-count">1/50</strong></span>
                </div>
                <div class="room-code-section">
                    <span class="room-code-label">MÃ PHÒNG</span>
                    <div class="room-code-value-wrapper">
                        <span id="lobby-room-code-display">XXXXX</span>
                        <button id="btn-copy-lobby-code" class="btn-copy-code" title="Sao chép mã phòng">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Active Players Setup Lists -->
        <div class="players-setup-list" id="players-setup-list">
            <!-- Dynamic player setup cards will be inserted here -->
        </div>

        <div class="lobby-actions">
            <button id="btn-start-game" class="btn btn-success btn-lg">
                <i class="fa-solid fa-flag-checkered"></i> Vào cuộc đua!
            </button>
            <div id="lobby-waiting-msg" style="display:none; font-size: 1rem; color: var(--warning); font-weight: 600;">
                <i class="fa-solid fa-spinner fa-spin"></i> Đang chờ chủ phòng bắt đầu trận đấu...
            </div>
        </div>
    </div>

    <!-- Character Selection Modal (within Lobby Screen for ease) -->
    <div id="char-select-modal" class="modal">
        <div class="modal-content char-select-content">
            <h3>Chọn Nhân Vật Ngựa</h3>
            <p class="modal-desc">Mỗi người chơi được tự do chọn nhân vật yêu thích, kể cả khi người khác đã chọn giống nhau.</p>
            <div class="char-grid" id="char-grid">
                <!-- 10 Horse characters populated by JS -->
            </div>
        </div>
    </div>

    <!-- Lobby Settings Modal (only for Host) -->
    <div id="lobby-settings-modal" class="modal">
        <div class="modal-content" id="lobby-settings-overlay" style="max-width: 420px; border: 3.5px solid #1e293b; border-radius: 20px; box-shadow: 6px 6px 0px #1e293b; padding: 28px; background: #ffffff; position: relative;">
            <button class="btn-close-modal" id="btn-close-lobby-settings-modal" style="position: absolute; top: 12px; right: 14px; background: transparent; border: none; font-size: 1.3rem; cursor: pointer; color: #64748b; z-index: 10;"><i class="fa-solid fa-xmark"></i></button>
            <h3 style="font-family: var(--font-title); font-size: 1.4rem; font-weight: 900; margin-bottom: 20px; border-bottom: 3px dashed #e2e8f0; padding-bottom: 10px; color: #1e293b; text-transform: uppercase; letter-spacing: 0.5px;">⚙️ Cấu Hình Phòng</h3>
            <div class="settings-controls" style="display: flex; flex-direction: column; gap: 18px; margin-bottom: 24px;">
                <div class="control-row checkbox-row" style="display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px;">
                    <label class="switch-container">
                        <input type="checkbox" id="chk-host-spectate">
                        <span class="switch-slider"></span>
                    </label>
                    <span class="control-label" style="font-weight: 700; font-size: 0.95rem; color: #1e293b;">Chế độ khán giả (Chỉ theo dõi)</span>
                </div>
                <div class="control-row input-row" style="display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px;">
                    <span class="control-label" style="font-weight: 700; font-size: 0.95rem; color: #1e293b; flex: 1;">Số phút chơi (1 - 180):</span>
                    <input type="number" id="input-game-duration" value="30" min="1" max="180" style="width: 75px; padding: 6px 10px; border: 2.5px solid #cbd5e1; border-radius: 10px; font-weight: 800; text-align: center; background: #ffffff; color: #1e293b; font-size: 1rem;">
                </div>
            </div>
            <div style="display: flex; justify-content: flex-end;">
                <button id="btn-save-lobby-settings" class="btn btn-success" style="font-weight: 800; padding: 10px 24px; border: 3px solid #1e293b; border-radius: 12px; box-shadow: 3px 3px 0px #1e293b; font-size: 0.95rem;">Lưu & Đóng</button>
            </div>
        </div>
    </div>
</section>
