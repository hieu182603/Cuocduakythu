<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuộc Đua Kỳ Thú - Party Board Game & Quiz</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300..900&family=Plus+Jakarta+Sans:wght@300..800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="screens/splash.css">
    <link rel="stylesheet" href="screens/menu.css">
    <link rel="stylesheet" href="screens/lobby.css">
    <link rel="stylesheet" href="screens/gameplay.css">
    <link rel="stylesheet" href="screens/victory.css">
    <link rel="stylesheet" href="css/map.css?v=5">
</head>
<body>

    <!-- Main Container -->
    <div id="app-container">

        <!-- Screens will be loaded dynamically here -->

        <!-- 6. COMMON MODALS (SETTINGS & QUESTION POOL) -->
        


        <!-- Questions Pool Modal -->
        <div id="questions-pool-modal" class="modal">
            <div class="modal-content standard-modal-content question-pool-content">
                <div class="modal-header">
                    <h3>Kho Câu Hỏi Trắc Nghiệm</h3>
                    <button class="btn-close-modal" id="btn-close-qpool"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="qpool-body">
                    <div class="qpool-stats">Tổng số câu hỏi: <span id="qpool-count">0</span></div>
                    <div class="qpool-list" id="qpool-list">
                        <!-- Loaded dynamically -->
                    </div>
                </div>
            </div>
        </div>
        <!-- Custom Confirm Modal -->
        <div id="custom-confirm-modal" class="modal" style="z-index: 1000;">
            <div class="modal-overlay" id="confirm-modal-overlay"></div>
            <div class="modal-content standard-modal-content" style="max-width: 400px; border: 3.5px solid #1e293b; border-radius: 20px; box-shadow: 6px 6px 0px #1e293b; padding: 25px; background: #ffffff; text-align: center; position: relative; z-index: 1001;">
                <h3 style="font-family: var(--font-title); font-size: 1.4rem; font-weight: 900; margin-bottom: 12px; color: #ef4444; text-transform: uppercase; letter-spacing: 1px;">Xác nhận thoát</h3>
                <p id="confirm-modal-message" style="font-weight: 700; font-size: 1rem; color: #1e293b; margin-bottom: 20px; line-height: 1.5;">Bạn có chắc muốn thoát ván chơi này? Tiến trình chơi sẽ bị mất.</p>
                <div style="display: flex; justify-content: center; gap: 15px;">
                    <button id="btn-confirm-yes" class="btn btn-danger" style="font-weight: 800; padding: 8px 20px; border: 3px solid #1e293b; box-shadow: 3px 3px 0px #1e293b;">Đồng ý</button>
                    <button id="btn-confirm-no" class="btn btn-secondary" style="font-weight: 800; padding: 8px 20px; border: 3px solid #1e293b; box-shadow: 3px 3px 0px #1e293b; background: #e2e8f0; color: #1e293b;">Hủy</button>
                </div>
            </div>
        </div>

    </div>

    <!-- SignalR CDN Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    
    <!-- Custom JS Modules -->
    <script src="js/config.js?v=6"></script>
    <script src="js/constants.js?v=6"></script>
    <script src="js/state.js?v=6"></script>
    <script src="js/notifications.js?v=5"></script>
    <script src="js/ui.js?v=5"></script>
    <script src="js/lobby.js?v=5"></script>
    <script src="js/gameplay.js?v=5"></script>
    <script src="js/signalr-handlers.js?v=5"></script>
    <script src="app.js?v=5"></script>
</body>
</html>
